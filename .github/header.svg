<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 280" width="1280" height="280" role="img" aria-label="Ziad Said — Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0d1117"></stop>
      <stop offset="100%" stop-color="#161b22"></stop>
    </linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#58a6ff" stop-opacity="0"></stop>
      <stop offset="50%" stop-color="#58a6ff" stop-opacity="1"></stop>
      <stop offset="100%" stop-color="#58a6ff" stop-opacity="0"></stop>
    </linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#21262d" stroke-width="1"></path>
    </pattern>
    
  </defs>

  
  <rect width="1280" height="280" fill="url(#bg)"></rect>
  <rect width="1280" height="280" fill="url(#grid)" opacity="0.5"></rect>

  
  <g class="float-1" opacity="0.7">
    <circle cx="1080" cy="90" r="3" class="dot"></circle>
  </g>
  <g class="float-2" opacity="0.5">
    <rect x="1160" y="200" width="6" height="6" fill="#58a6ff"></rect>
  </g>

  
  <g class="ring" opacity="0.35">
    <circle cx="1110" cy="140" r="78" fill="none" stroke="#30363d" stroke-width="1"></circle>
    <circle cx="1110" cy="62" r="2.5" class="accent"></circle>
  </g>
  <circle cx="1110" cy="140" r="40" fill="none" stroke="#21262d" stroke-width="1"></circle>

  
  <rect x="60" y="80" width="3" height="120" fill="#58a6ff"></rect>

  
  <text x="84" y="148" class="name">Ziad Said<tspan fill="#58a6ff">.</tspan></text>

  
  <text x="84" y="184" class="tag">Full Stack Developer · Egypt / Remote</text>

  
  <g transform="translate(84, 220)">
    <text class="tag" fill="#3fb950">&gt;</text>
    <text x="22" class="tag" fill="#8d96a0">currently @ flovoo</text>
    <rect x="232" y="-12" width="9" height="14" fill="#58a6ff" class="blink"></rect>
  </g>

  
  <g>
    <rect x="0" y="0" width="300" height="1" fill="url(#line)" class="sweep"></rect>
  </g>

  
  <line x1="0" y1="279" x2="1280" y2="279" stroke="#30363d"></line>
</svg>