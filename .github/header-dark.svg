<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 380" width="1280" height="380" role="img" aria-label="Ziad Said — Full Stack Developer">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a120c"/>
      <stop offset="50%" stop-color="#211611"/>
      <stop offset="100%" stop-color="#1a120c"/>
    </linearGradient>
    <radialGradient id="glow1" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d99863" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#d99863" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#c95d56" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#c95d56" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sweepline" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#d99863" stop-opacity="0"/>
      <stop offset="50%" stop-color="#d99863" stop-opacity="1"/>
      <stop offset="100%" stop-color="#d99863" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="accentbar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d99863" stop-opacity="0"/>
      <stop offset="20%" stop-color="#d99863" stop-opacity="1"/>
      <stop offset="80%" stop-color="#c95d56" stop-opacity="1"/>
      <stop offset="100%" stop-color="#c95d56" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#d99863" stroke-width="0.5" opacity="0.12"/>
    </pattern>
    <pattern id="dots" width="8" height="8" patternUnits="userSpaceOnUse">
      <circle cx="1" cy="1" r="0.5" fill="#d99863" opacity="0.15"/>
    </pattern>
    <mask id="gridmask">
      <radialGradient id="gridfade" cx="50%" cy="50%" r="55%">
        <stop offset="0%" stop-color="white" stop-opacity="1"/>
        <stop offset="100%" stop-color="white" stop-opacity="0"/>
      </radialGradient>
      <rect width="1280" height="380" fill="url(#gridfade)"/>
    </mask>
    <style><![CDATA[
      .name-fill {
        font: 700 132px Georgia, "Times New Roman", ui-serif, serif;
        fill: #f0eadb;
        letter-spacing: -4px;
      }
      .name-outline {
        font: 700 132px Georgia, "Times New Roman", ui-serif, serif;
        fill: none;
        stroke: #f0eadb;
        stroke-width: 1.5;
        stroke-opacity: 0.5;
        letter-spacing: -4px;
      }
      .greeting {
        font: 700 13px ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        fill: #d99863;
        letter-spacing: 4.5px;
        text-transform: uppercase;
      }
      .role {
        font: 500 18px ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        fill: #f0eadb;
        letter-spacing: 5px;
        text-transform: uppercase;
      }
      .role-mute { fill: #8a7a6b; }
      .meta {
        font: 400 11px ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        fill: #8a7a6b;
        letter-spacing: 2.4px;
        text-transform: uppercase;
      }
      .status {
        font: 600 12px ui-monospace, "SF Mono", Menlo, Consolas, monospace;
        letter-spacing: 1.4px;
      }
      .scanlines {
        opacity: 0.25;
      }
      .sweep { animation: sweep 8s ease-in-out infinite; }
      @keyframes sweep {
        0%, 100% { transform: translateX(-300px); opacity: 0; }
        12% { opacity: 1; }
        88% { opacity: 1; }
        100% { transform: translateX(1300px); opacity: 0; }
      }
      .blink { animation: blink 1.1s steps(1) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      .ping {
        transform-origin: 1110px 80px;
        animation: ping 2.4s ease-out infinite;
      }
      @keyframes ping {
        0% { r: 4; opacity: 0.6; }
        100% { r: 18; opacity: 0; }
      }
      .live { animation: livedot 2s ease-in-out infinite; }
      @keyframes livedot {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.4; }
      }
      .float-1 { animation: float 7s ease-in-out infinite; }
      .float-2 { animation: float 9s ease-in-out -2s infinite; }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      .rot { transform-origin: 1110px 180px; animation: rot 32s linear infinite; }
      @keyframes rot { to { transform: rotate(360deg); } }
    ]]></style>
  </defs>

  <!-- Background -->
  <rect width="1280" height="380" fill="url(#bg)"/>
  <ellipse cx="180" cy="120" rx="380" ry="220" fill="url(#glow1)"/>
  <ellipse cx="1100" cy="280" rx="320" ry="200" fill="url(#glow2)"/>

  <!-- Grid with radial fade -->
  <g mask="url(#gridmask)">
    <rect width="1280" height="380" fill="url(#grid)"/>
  </g>

  <!-- Scanlines -->
  <g class="scanlines">
    <pattern id="scan" width="3" height="3" patternUnits="userSpaceOnUse">
      <rect width="3" height="1" fill="#f0eadb" opacity="0.04"/>
    </pattern>
    <rect width="1280" height="380" fill="url(#scan)"/>
  </g>

  <!-- Corner brackets (portfolio motif) -->
  <g stroke="#d99863" stroke-width="1.5" fill="none" opacity="0.6">
    <path d="M 32 32 L 32 64 M 32 32 L 64 32"/>
    <path d="M 1248 32 L 1248 64 M 1248 32 L 1216 32"/>
    <path d="M 32 348 L 32 316 M 32 348 L 64 348"/>
    <path d="M 1248 348 L 1248 316 M 1248 348 L 1216 348"/>
  </g>

  <!-- Decorative orbit (right side) -->
  <g class="rot" opacity="0.45">
    <circle cx="1110" cy="180" r="120" fill="none" stroke="#3d2a1d" stroke-width="1"/>
    <circle cx="1110" cy="60" r="4" fill="#d99863"/>
    <circle class="ping" cx="1110" cy="60" r="4" fill="#d99863"/>
  </g>
  <circle cx="1110" cy="180" r="80" fill="none" stroke="#2d1f15" stroke-width="1"/>
  <circle cx="1110" cy="180" r="40" fill="none" stroke="#2d1f15" stroke-width="1" stroke-dasharray="3 5"/>
  <g class="float-2" opacity="0.55">
    <rect x="1180" y="295" width="6" height="6" fill="#d99863"/>
  </g>
  <g class="float-1" opacity="0.5">
    <circle cx="980" cy="80" r="2.5" fill="#c95d56"/>
  </g>

  <!-- Greeting line (top left) -->
  <g transform="translate(70, 76)">
    <rect x="0" y="-5" width="20" height="2" fill="#d99863"/>
    <text x="32" y="0" class="greeting">HI, I AM</text>
  </g>

  <!-- Big ZIAD SAID title (filled + outlined like portfolio hero) -->
  <text x="64" y="200" class="name-fill">ZIAD</text>
  <text x="270" y="260" class="name-outline">SAID<tspan fill="#d99863" stroke="none" fill-opacity="1">.</tspan></text>

  <!-- Role line -->
  <g transform="translate(70, 308)">
    <rect x="0" y="-12" width="3" height="16" fill="url(#accentbar)"/>
    <text x="16" y="0" class="role">FULL STACK<tspan class="role-mute"> · </tspan>DEVELOPER</text>
  </g>

  <!-- Status line bottom -->
  <g transform="translate(70, 344)">
    <circle cx="5" cy="-4" r="4" fill="#3fb950" class="live"/>
    <text x="20" y="0" class="status" fill="#8a7a6b">CURRENTLY @</text>
    <text x="142" y="0" class="status" fill="#d99863">FLOVOO</text>
    <text x="220" y="0" class="status" fill="#5a4838">·</text>
    <text x="240" y="0" class="status" fill="#8a7a6b">EGYPT / REMOTE</text>
    <rect x="385" y="-12" width="9" height="14" fill="#d99863" class="blink"/>
  </g>

  <!-- Top right meta -->
  <text x="1248" y="80" class="meta" text-anchor="end">PORTFOLIO · V2026</text>

  <!-- Sweep line -->
  <rect x="0" y="0" width="300" height="1" fill="url(#sweepline)" class="sweep"/>

  <!-- Bottom border -->
  <line x1="0" y1="379" x2="1280" y2="379" stroke="#3d2a1d"/>
</svg>
